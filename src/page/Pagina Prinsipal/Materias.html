<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informe de Avances</title>
    <link rel="stylesheet" href="StylesMaterias.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://kit.fontawesome.com/your-fontawesome-kit.js" crossorigin="anonymous"></script>

<body>
  </header>

  <section class="avance-general">
    <h2>Avance General</h2>
    <div class="barra">
      <div class="progreso" style="width: 68%;"></div>
    </div>
    <p>68/100%</p>
    <h2>Cursos</h2>
  </section>
  <section class="cursos">
    <div class="card comunicacion">
      <h3>Comunicación</h3>
      <div class="barra">
        <div class="progreso" style="width: 43%;"></div>
      </div>
      <p>Avance 43/100</p>
      <button class="play pink">▶</button>
    </div>

    <div class="card ingles">
      <h3>Inglés</h3>
      <div class="barra">
        <div class="progreso" style="width: 98%;"></div>
      </div>
      <p>Avance 98/100</p>
      <button class="play blue">▶</button>
    </div>

    <div class="card matematica">
      <h3>Matemática</h3>
      <div class="barra">
        <div class="progreso" style="width: 69%;"></div>
      </div>
      <p>Avance 69/100</p>
      <button class="play green">▶</button>
    </div>
  </section>

  <footer>
    <nav>
      <ul>
        <li><a href="Home.html" class="enlace"><i class="fas fa-house"></i> Inicio</a></li>
        <li class="activo"><i class="fas fa-book"></i> Cursos</li>
        <li><i class="fas fa-magnifying-glass"></i> Buscar</li>
        <li><i class="fas fa-comment"></i> Mensajes</li>
        <li><i class="fas fa-user"></i> Perfil</li>
      </ul>
    </nav>
  </footer>

</html>
