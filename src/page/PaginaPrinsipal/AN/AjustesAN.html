<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ajustes</title>
  <link rel="stylesheet" href="StylesAjustesAN.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>
<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h2>Panel</h2>

  <nav class="menu">
            <ul>
                <li><a href="HomeAN.html"><i class="fas fa-qrcode"></i> Panel General</a></li>
                <li><a href="EstudiantesAN.html"><i class="fas fa-user-graduate"></i> Estudiantes</a></li>
                <li><a href="MateriasAN.html"><i class="fas fa-book"></i> Materias</a></li>
                <li><a href="RegistroAN.html"><i class="fas fa-chart-line"></i> Registro de Avances</a></li>
                <li class="active"><a href="AjustesAN.html"><i class="fas fa-cog"></i> Ajustes</a></li>
                <li><a href="/src/page/PaginaPrinsipal/Index.html"><i class="fas fa-sign-out-alt"> </i> Cerrar sesión</a></li>
            </ul>
      </nav>

      <div class="sidebar-footer">
        <div class="user-info">
          <img src="/public/image/perfil.png" alt="Usuario">
          <p>Profesor Camacho</p>
        </div>

        <div class="company">
          <img src="/public/image/Logo de SERMA.jpg" alt="logo">
          <span>SERMA</span>
        </div>
      </div>
</div>

<button class="toggle-btn" onclick="toggleSidebar()">
  <i class="fas fa-bars"></i>
</button>
<header class="header">
  <div>
    <h1>Ajustes</h1>
    <p>Configura tu cuenta y preferencias</p>
  </div>
  <button class="primary">Guardar Cambios</button>
</header>

<section class="settings-container">

  <!-- PERFIL -->
  <div class="card">
    <h3>Perfil</h3>

    <label>Nombre</label>
    <input type="text" id="name" value="Prof. Alejandro">

    <label>Email</label>
    <input type="email" id="email" value="alejandro@email.com">

    <label>Contraseña</label>
    <input type="password" placeholder="********">
  </div>

  <!-- NOTIFICACIONES -->
  <div class="card">
    <h3>Notificaciones</h3>

    <div class="toggle">
      <span>Recibir alertas de evaluaciones</span>
      <input type="checkbox" checked>
    </div>

    <div class="toggle">
      <span>Recordatorios de entrega</span>
      <input type="checkbox" checked>
    </div>

    <div class="toggle">
      <span>Resumen semanal</span>
      <input type="checkbox">
    </div>
  </div>

  <!-- PREFERENCIAS -->
  <div class="card">
    <h3>Preferencias</h3>

    <label>Tema</label>
    <select id="theme">
      <option value="light">Claro</option>
      <option value="dark">Oscuro</option>
    </select>

    <label>Idioma</label>
    <select>
      <option>Español</option>
      <option>English</option>
    </select>

  </div>

</section>

<script src="ScriptAjustesAN.js"></script>
</body>
</html>
